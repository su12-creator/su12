<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Index of /usr/share/doc/core</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: #ffffff; 
            font-family: monospace; 
            font-size: 13px;
            color: #000000;
            overflow: hidden; 
            position: relative;
        }
        .error-log-view {
            padding: 20px;
            line-height: 1.6;
            user-select: none;
        }
        .error-log-view a {
            color: #0000ee;
            text-decoration: underline;
            cursor: pointer;
        }
        .game-container { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            z-index: 100;
            background: #ffffff;
            display: none;
            flex-direction: column;
        }
        .game-container.visible {
            display: flex;
        }
        iframe { 
            border: none; 
            flex: 1;
            width: 100%; 
            height: 100%; 
            display: none; 
        }
        iframe.active { 
            display: block; 
        }
        /* Completely invisible panic target spanning the bottom edge */
        .panic-bar {
            height: 15px;
            width: 100%;
            background: transparent;
            cursor: pointer;
            z-index: 99999;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

    <!-- The Phantom Camouflage Layer -->
    <div class="error-log-view">
        <h1>Index of /usr/share/doc/core</h1>
        <hr>
        <pre>
<a href="#">../</a>
[DIR] <a href="#">build_assets/</a>             2026-07-10 14:15     -  
[TXT] <a onclick="triggerRuntimePrompt()">update_dependency.log</a>     2026-07-11 08:42  14.3K
[TXT] <a href="#">version_manifest.inf</a>      2026-07-11 11:59   1.2K
        </pre>
        <hr>
        <address>Apache/2.4.41 (Ubuntu) Server at localhost Port 80</address>
    </div>

    <!-- The Performance Engine Vault -->
    <div class="game-container" id="vault">
        <!-- 1: Moto X3M Main Dashboard -->
        <iframe class="active" src="https://motox3monlineunblocked.github.io/" allowfullscreen></iframe>
        
        <!-- 2: Run 3 -->
        <iframe src="https://run3-coolmath.github.io/" allowfullscreen></iframe>
        
        <!-- 3: Tiny Fishing (Protected sandbox) -->
        <iframe src="https://playxiagames.github.io/games/tiny-fishing/" sandbox="allow-scripts allow-same-origin allow-popups-to-escape-sandbox" allowfullscreen></iframe>

        <!-- 4: Geometry Dash (Anti-redirect blindfold sandbox) -->
        <iframe src="https://geometrylite.github.io/" sandbox="allow-scripts allow-downloads" allowfullscreen></iframe>

        <!-- Panic Trigger: Tap the absolute bottom edge of your screen to drop back to safety instantly -->
        <div class="panic-bar" onclick="hideVault()"></div>
    </div>

    <script>
        const vault = document.getElementById('vault');
        const iframes = document.querySelectorAll('iframe');

        function triggerRuntimePrompt() {
            const code = prompt("Log index sequence code required:");
            if (code === "1" || code === "2" || code === "3" || code === "4") {
                vault.classList.add('visible');
                iframes.forEach(f => f.classList.remove('active'));
                iframes[parseInt(code) - 1].classList.add('active');
            }
        }

        function hideVault() {
            vault.classList.remove('visible');
        }
    </script>
</body>
</html>
